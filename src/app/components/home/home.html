<div class="container text-center my-5" [ngClass]="isDarkMode ? 'dark-mode' : 'light-mode'">

  <!-- Hero Section -->
  <section class="hero-section mb-5">
    <h1 class="display-4">{{ 'HOME.TITLE' | translate }}</h1>
    <p class="lead">{{ 'HOME.DESC' | translate }}</p>

    <form [formGroup]="usernameForm" (ngSubmit)="startChat()">
      <div class="d-flex justify-content-center gap-2 mt-3 flex-column flex-sm-row align-items-center">
        <input type="text" formControlName="username" class="form-control w-auto hero-input"
          placeholder="{{ 'HOME.NAME_PLACEHOLDER' | translate }}">
        <button type="submit" class="btn btn-primary btn-lg hero-btn">
          {{ 'HOME.START' | translate }}
        </button>
      </div>
    </form>
  </section>

  <!-- Sections -->
  <section class="sections-wrapper row g-4" [attr.dir]="currentDir">
    <div class="col-lg-4 col-md-6" *ngFor="let section of sections">
      <div class="card h-100 shadow-sm p-4 section-card text-center">
        <i [class]="section.icon + ' fa-2x mb-3 section-icon'"></i>
        <h3 class="card-title">{{ section.title | translate }}</h3>
        <p class="card-text">{{ section.desc | translate }}</p>
        <ul class="card-detail-list">
          <li *ngFor="let detail of section.details">{{ detail | translate }}</li>
        </ul>
      </div>
    </div>
  </section>
</div>

<!-- Mode Selection Modal Overlay -->
<div class="mode-overlay" *ngIf="showModeSelector" (click)="closeModeSelector()">
  <div class="mode-modal" [ngClass]="isDarkMode ? 'dark-mode' : 'light-mode'" (click)="$event.stopPropagation()">
    <div class="mode-modal-header">
      <h3>{{ 'HOME.CHOOSE_MODE' | translate }}</h3>
      <p>{{ 'HOME.CHOOSE_MODE_DESC' | translate }}</p>
    </div>
    <div class="mode-options">
      <!-- Text Chat Option -->
      <button class="mode-card" (click)="selectMode('chat')">
        <div class="mode-icon-wrapper chat-icon-wrapper">
          <i class="fas fa-comments"></i>
        </div>
        <h4>{{ 'HOME.TEXT_CHAT' | translate }}</h4>
        <p>{{ 'HOME.TEXT_CHAT_DESC' | translate }}</p>
        <span class="mode-badge">{{ 'HOME.FREE' | translate }}</span>
      </button>

      <!-- Video Call Option -->
      <button class="mode-card" (click)="selectMode('video')">
        <div class="mode-icon-wrapper video-icon-wrapper">
          <i class="fas fa-video"></i>
        </div>
        <h4>{{ 'HOME.VIDEO_CALL' | translate }}</h4>
        <p>{{ 'HOME.VIDEO_CALL_DESC' | translate }}</p>
        <span class="mode-badge video-badge">{{ 'HOME.NEW' | translate }}</span>
      </button>
    </div>
    <button class="mode-close-btn" (click)="closeModeSelector()">
      <i class="fas fa-times"></i>
    </button>
  </div>
</div>
