<div class="notfound-wrapper" [ngClass]="isDarkMode ? 'dark-mode' : 'light-mode'">

  <!-- Background blobs -->
  <div class="nf-bg">
    <div class="nf-blob nf-blob-1"></div>
    <div class="nf-blob nf-blob-2"></div>
  </div>

  <div class="nf-content">

    <!-- Glitch 404 -->
    <div class="nf-code-wrap">
      <span class="nf-code" aria-hidden="true">404</span>
      <span class="nf-code nf-code-glitch" aria-hidden="true">404</span>
      <span class="nf-code nf-code-glitch2" aria-hidden="true">404</span>
    </div>

    <!-- Icon -->
    <div class="nf-icon">
      <i class="fas fa-compass"></i>
    </div>

    <h1>{{ 'ERROR.PAGE_NOT_FOUND' | translate }}</h1>
    <p>{{ 'ERROR.DESCRIPTION' | translate }}</p>

    <a routerLink="/" class="nf-btn">
      <i class="fas fa-home"></i>
      {{ 'ERROR.GO_HOME' | translate }}
    </a>

  </div>

</div>
